<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="blob2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.5" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Decorative blobs -->
  <ellipse cx="200" cy="100" rx="300" ry="250" fill="url(#blob1)" opacity="0.3" />
  <ellipse cx="1000" cy="500" rx="350" ry="300" fill="url(#blob2)" opacity="0.25" />
  <ellipse cx="600" cy="315" rx="200" ry="200" fill="#06b6d4" opacity="0.1" />

  <!-- Avatar circle -->
  <circle cx="600" cy="250" r="80" fill="url(#blob1)" />
  <text x="600" y="265" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="48" font-weight="bold">CMT</text>

  <!-- Name -->
  <text x="600" y="420" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="56" font-weight="bold">Chen Mingtao</text>

  <!-- Title -->
  <text x="600" y="480" text-anchor="middle" fill="#a78bfa" font-family="Inter, sans-serif" font-size="28" font-weight="500">Full-stack Developer</text>

  <!-- Description -->
  <text x="600" y="540" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="20">Developer-focused personal website</text>

  <!-- Social links -->
